[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --color=yes
markers =
    smoke: 零上游成本的契约/结构/CORS/404/鉴权测试
    cost: 会真实消耗上游 sider.ai 额度的测试
    chat: 对话生成能力
    stream: 流式 SSE 相关
    multiturn: 多轮会话记忆 (X-Session-ID)
    think: think 模式 (-think 后缀)
    image: 图像生成能力
    perf: 性能度量 (TTFT/延迟/吞吐), 较慢
    openai: OpenAI Chat Completions + Responses API 端点
    gemini: Gemini generateContent 端点 (已实现)
    anthropic: Anthropic Messages API 端点 (已实现)
    tools: 客户端工具调用 / Function Calling (能力门控降级, 已实现)
    vision: 视觉/多模态输入 (能力门控 not_supported, 已实现)
