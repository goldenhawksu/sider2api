[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --color=yes
markers =
    smoke: 零上游成本的契约/结构/CORS/404/鉴权测试
    cost: 会真实消耗上游 sider.ai 额度的测试
    chat: 对话生成能力
    stream: 流式 SSE 相关
    multiturn: 多轮会话记忆 (X-Session-ID)
    think: think 模式 (-think 后缀)
    image: 图像生成能力
    perf: 性能度量 (TTFT/延迟/吞吐), 较慢
    openai: OpenAI 消息格式 (当前唯一支持)
    gemini: (预留) Gemini 原生消息格式
    anthropic: (预留) Anthropic 原生消息格式
    tools: (预留) 客户端工具调用 function calling
    vision: (预留) 视觉/多模态输入
